services:
  - type: web
    name: n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest

    plan: free

    envVars:
      - key: N8N_HOST
        value: n8n.onrender.com

      - key: N8N_PROTOCOL
        value: https

      - key: N8N_PORT
        value: "5678"

      - key: N8N_SECURE_COOKIE
        value: "false"

      - key: GENERIC_TIMEZONE
        value: Asia/Dhaka

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
