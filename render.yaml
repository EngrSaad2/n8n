services:
  - type: web
    name: n8n
    runtime: image

    image:
      url: docker.io/n8nio/n8n:1.111.0

    plan: free

    envVars:
      - key: N8N_PROTOCOL
        value: https

      - key: N8N_PORT
        value: "5678"

      - key: N8N_SECURE_COOKIE
        value: "false"

      - key: GENERIC_TIMEZONE
        value: Asia/Dhaka

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: DB_TYPE
        value: sqlite

      - key: DB_SQLITE_DATABASE
        value: /tmp/database.sqlite
